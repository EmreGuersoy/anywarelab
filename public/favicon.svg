<!-- Option 1: Classic 96-well plate — 8×12 grid, outer wells filled dark, inner wells outline -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="5" fill="#111"/>
  <!-- Wells: 4 cols × 3 rows, representative subset, white dots on black -->
  <circle cx="7"  cy="8"  r="2.2" fill="white" opacity="1"/>
  <circle cx="13" cy="8"  r="2.2" fill="white" opacity="0.85"/>
  <circle cx="19" cy="8"  r="2.2" fill="white" opacity="0.6"/>
  <circle cx="25" cy="8"  r="2.2" fill="white" opacity="0.35"/>

  <circle cx="7"  cy="14" r="2.2" fill="white" opacity="0.85"/>
  <circle cx="13" cy="14" r="2.2" fill="none"  stroke="white" stroke-width="0.9" opacity="0.9"/>
  <circle cx="19" cy="14" r="2.2" fill="none"  stroke="white" stroke-width="0.9" opacity="0.7"/>
  <circle cx="25" cy="14" r="2.2" fill="white" opacity="0.35"/>

  <circle cx="7"  cy="20" r="2.2" fill="white" opacity="0.6"/>
  <circle cx="13" cy="20" r="2.2" fill="none"  stroke="white" stroke-width="0.9" opacity="0.7"/>
  <circle cx="19" cy="20" r="2.2" fill="none"  stroke="white" stroke-width="0.9" opacity="0.5"/>
  <circle cx="25" cy="20" r="2.2" fill="white" opacity="0.2"/>

  <circle cx="7"  cy="26" r="2.2" fill="white" opacity="0.35"/>
  <circle cx="13" cy="26" r="2.2" fill="white" opacity="0.2"/>
  <circle cx="19" cy="26" r="2.2" fill="white" opacity="0.15"/>
  <circle cx="25" cy="26" r="2.2" fill="white" opacity="0.1"/>
</svg>
